openapi: 3.0.3
info:
  title: Compute with Hivenet public API
  description: |
    The Compute with Hivenet public API lets you manage compute instances, SSH keys, and
    API tokens programmatically.

    **Base URL:** `https://api.hivenet.com/v1`

    **Authentication:** All endpoints require a Bearer token issued from
    `POST /v1/tokens`. Include it in every request:

    ```
    Authorization: Bearer <your-api-token>
    ```
  version: "1.0"
  contact:
    name: Hivenet Support
    url: https://hivenet.com

servers:
  - url: https://api.hivenet.com/v1
    description: Production

security:
  - bearerAuth: []

tags:
  - name: Instances
    description: |
      Compute instances are the core resource of the Compute with Hivenet platform.
      Each instance runs a GPU-backed workload on a specific hardware preset in
      a chosen region. Instances move through a lifecycle:
      `CREATED → DEPLOYED → STARTING → RUNNING → STOPPING → STOPPED → TERMINATING → TERMINATED`.
      A `TERMINATED` instance is permanently removed and cannot be restarted.

paths:
  /instances:
    get:
      operationId: listInstances
      tags:
        - Instances
      summary: List instances
      description: |
        Returns a cursor-paginated list of compute instances visible to the
        authenticated user. Results are ordered by creation time descending
        (newest first).

        Use the `pagination.next` cursor from one response as the `cursor`
        query parameter in the next request to retrieve the following page.
        When `pagination.next` is `null`, you have reached the last page.
      parameters:
        - name: cursor
          in: query
          required: false
          schema:
            type: string
          description: |
            Opaque pagination cursor returned by a previous response in
            `pagination.next`. Omit to start from the first page.
          example: "eyJpZCI6IjEyMyJ9"
        - name: size
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
          description: Number of instances to return per page.
          example: 20
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [running, stopped, terminated]
          description: |
            Filter by lifecycle status. Omit to return instances in all
            statuses.
          example: running
        - name: gpu_type
          in: query
          required: false
          schema:
            type: string
          description: Filter by GPU model identifier, e.g. `NVIDIA_A100_80G`.
          example: "NVIDIA_A100_80G"
        - name: region
          in: query
          required: false
          schema:
            type: string
          description: Filter by region slug, e.g. `us-east-1`.
          example: "us-east-1"
        - name: host_id
          in: query
          required: false
          schema:
            type: string
          description: Filter instances running on a specific host node.
        - name: user_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: Filter by the UUID of the user who owns the instance.
          example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
        - name: org_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: Filter by organization UUID.
          example: "f0e1d2c3-b4a5-6789-0123-456789abcdef"
        - name: date_range_begin
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: |
            Return instances created at or after this ISO 8601 timestamp
            (UTC). Must be used together with `date_range_end`.
          example: "2026-06-01T00:00:00Z"
        - name: date_range_end
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: |
            Return instances created at or before this ISO 8601 timestamp
            (UTC). Must be used together with `date_range_begin`.
          example: "2026-06-30T23:59:59Z"
        - name: free_text_search
          in: query
          required: false
          schema:
            type: string
            maxLength: 255
          description: |
            Full-text search across instance names and related fields.
          example: "training-run"
      responses:
        "200":
          description: A paginated list of instances.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InstanceListResponse"
              example:
                data:
                  - instance_id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                    name: "my-training-run"
                    user_id: "b2c3d4e5-f6a7-8901-bcde-f12345678901"
                    user_name: "alice"
                    user_email: "alice@example.com"
                    org_id: "c3d4e5f6-a7b8-9012-cdef-123456789012"
                    org_name: "Acme AI"
                    gpu_type: "NVIDIA_A100_80G"
                    size: 2
                    cpu_count: 32
                    region: "us-east-1"
                    host_id: "node-01.us-east-1"
                    hourly_rate: 4.80
                    current_cost: 9.60
                    total_cost_incurred: 9.60
                    total_runtime_hours: 2.0
                    storage_used_gb: 50
                    ttl_remaining_hours: 22.0
                    status: "RUNNING"
                    termination_reason: "OTHER_UNKNOWN"
                    terminated_at: null
                    resources: "{\"gpus\":[{\"model\":\"NVIDIA_A100_80G\",\"count\":2}]}"
                pagination:
                  next: "eyJpZCI6ImExYjJjM2Q0In0"
                  size: 50
        "400":
          description: Invalid query parameter value or format.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                statusCode: 400
                message:
                  - "status must be one of the following values: running, stopped, terminated"
                error: "Bad Request"
                timestamp: "2026-06-26T10:00:00.000Z"
                path: "/v1/instances"
        "401":
          description: Missing or invalid API token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                statusCode: 401
                message: "Missing API token"
                timestamp: "2026-06-26T10:00:00.000Z"
                path: "/v1/instances"
        "429":
          description: Rate limit exceeded. Retry after the indicated number of seconds.
          headers:
            Retry-After:
              schema:
                type: integer
              description: Seconds to wait before retrying.
              example: 60
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                statusCode: 429
                message: "Too Many Requests"
                timestamp: "2026-06-26T10:00:00.000Z"
                path: "/v1/instances"

  /instances/{id}:
    get:
      operationId: getInstance
      tags:
        - Instances
      summary: Get an instance
      description: Returns the current state of a single compute instance by its UUID.
      parameters:
        - $ref: "#/components/parameters/instanceId"
      responses:
        "200":
          description: The requested instance.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Instance"
              example:
                instance_id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                name: "my-training-run"
                user_id: "b2c3d4e5-f6a7-8901-bcde-f12345678901"
                user_name: "alice"
                user_email: "alice@example.com"
                org_id: "c3d4e5f6-a7b8-9012-cdef-123456789012"
                org_name: "Acme AI"
                gpu_type: "NVIDIA_A100_80G"
                size: 2
                cpu_count: 32
                region: "us-east-1"
                host_id: "node-01.us-east-1"
                hourly_rate: 4.80
                current_cost: 9.60
                total_cost_incurred: 9.60
                total_runtime_hours: 2.0
                storage_used_gb: 50
                ttl_remaining_hours: 22.0
                status: "RUNNING"
                termination_reason: "OTHER_UNKNOWN"
                terminated_at: null
                resources: "{\"gpus\":[{\"model\":\"NVIDIA_A100_80G\",\"count\":2}]}"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"

  /instances/{id}/start:
    post:
      operationId: startInstance
      tags:
        - Instances
      summary: Start an instance
      description: |
        Starts a stopped instance. The instance moves through
        `STARTING → RUNNING` asynchronously. Poll `GET /v1/instances/{id}`
        to check when it reaches `RUNNING`.

        Has no effect and returns the current instance state if the instance
        is already running.
      parameters:
        - $ref: "#/components/parameters/instanceId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InstanceActionRequest"
      responses:
        "200":
          description: The instance with its updated state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Instance"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"

  /instances/{id}/terminate:
    post:
      operationId: terminateInstance
      tags:
        - Instances
      summary: Terminate an instance
      description: |
        Permanently terminates an instance. The instance moves through
        `STOPPING → TERMINATED` asynchronously. **This action is
        irreversible** — a terminated instance cannot be restarted and all
        its data is deleted.

        Poll `GET /v1/instances/{id}` to confirm the instance reaches
        `TERMINATED`.
      parameters:
        - $ref: "#/components/parameters/instanceId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InstanceActionRequest"
      responses:
        "200":
          description: The instance with its updated state (status will be `STOPPING` or `TERMINATED`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Instance"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"

  /instances/{id}/logs:
    get:
      operationId: getInstanceLogs
      tags:
        - Instances
      summary: Get instance logs
      description: |
        Returns the most recent log lines from the instance's container
        output. Logs are fetched from the last 600 minutes of activity.
      parameters:
        - $ref: "#/components/parameters/instanceId"
        - name: lines
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 100
          description: Number of log lines to return (most recent first).
          example: 200
      responses:
        "200":
          description: Log entries from the instance.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InstanceLogsResponse"
              example:
                entries:
                  - timestamp: "2026-06-26T10:01:00Z"
                    message: "Training epoch 1/10 complete. Loss: 0.342"
                  - timestamp: "2026-06-26T10:02:15Z"
                    message: "Training epoch 2/10 complete. Loss: 0.298"
                line_count: 2
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"

components:
  parameters:
    instanceId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: UUID of the instance.
      example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"

  responses:
    Unauthorized:
      description: Missing or invalid API token.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            statusCode: 401
            message: "Missing API token"
            timestamp: "2026-06-26T10:00:00.000Z"
            path: "/v1/instances"
    NotFound:
      description: Instance not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            statusCode: 404
            message: "Instance a1b2c3d4-e5f6-7890-abcd-ef1234567890 not found"
            timestamp: "2026-06-26T10:00:00.000Z"
            path: "/v1/instances/a1b2c3d4-e5f6-7890-abcd-ef1234567890"
    RateLimited:
      description: Rate limit exceeded. Retry after the indicated number of seconds.
      headers:
        Retry-After:
          schema:
            type: integer
          description: Seconds to wait before retrying.
          example: 60
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            statusCode: 429
            message: "Too Many Requests"
            timestamp: "2026-06-26T10:00:00.000Z"
            path: "/v1/instances"

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: |
        API token obtained from `POST /v1/tokens`. Tokens are long-lived until
        explicitly revoked via `DELETE /v1/tokens/{id}`.

  schemas:
    Instance:
      type: object
      description: A compute instance and its current state.
      properties:
        instance_id:
          type: string
          format: uuid
          description: Unique identifier for the instance.
          example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
        name:
          type: string
          description: Human-readable name assigned at launch.
          example: "my-training-run"
        user_id:
          type: string
          format: uuid
          description: UUID of the user who owns the instance.
          example: "b2c3d4e5-f6a7-8901-bcde-f12345678901"
        user_name:
          type: string
          description: Display name of the owning user.
          example: "alice"
        user_email:
          type: string
          format: email
          description: Email address of the owning user.
          example: "alice@example.com"
        org_id:
          type: string
          format: uuid
          description: UUID of the organization the instance belongs to.
          example: "c3d4e5f6-a7b8-9012-cdef-123456789012"
        org_name:
          type: string
          description: Display name of the organization.
          example: "Acme AI"
        gpu_type:
          type: string
          description: GPU model identifier for this instance.
          example: "NVIDIA_A100_80G"
        size:
          type: integer
          description: Number of GPU cards allocated.
          example: 2
        cpu_count:
          type: integer
          description: Number of vCPU cores allocated.
          example: 32
        region:
          type: string
          description: Region slug where the instance runs.
          example: "us-east-1"
        host_id:
          type: string
          description: Identifier of the physical host node.
          example: "node-01.us-east-1"
        hourly_rate:
          type: number
          format: float
          description: Credit cost per hour for this instance.
          example: 4.80
        current_cost:
          type: number
          format: float
          description: Credits consumed in the current running session.
          example: 9.60
        total_cost_incurred:
          type: number
          format: float
          description: Total credits consumed across all sessions.
          example: 9.60
        total_runtime_hours:
          type: number
          format: float
          description: Total hours the instance has been in RUNNING state.
          example: 2.0
        storage_used_gb:
          type: number
          format: float
          description: Persistent storage used by the instance in gigabytes.
          example: 50
        ttl_remaining_hours:
          type: number
          format: float
          description: |
            Hours remaining before the instance is automatically terminated.
            `null` if no TTL is configured.
          nullable: true
          example: 22.0
        status:
          type: string
          description: |
            Current lifecycle status. Possible values:

            | Value | Meaning |
            |-------|---------|
            | `CREATED` | Instance record created; not yet scheduled. |
            | `DEPLOYED` | Scheduled on a host; waiting to start. |
            | `STARTING` | Instance is booting. |
            | `RUNNING` | Instance is running and accessible. |
            | `STOPPING` | Shutdown in progress. |
            | `STOPPED` | Stopped; can be restarted. Billing is paused. |
            | `ERRORED` | An unrecoverable error occurred. |
            | `TERMINATED` | Permanently removed. Cannot be restarted. |
          enum:
            - CREATED
            - DEPLOYED
            - STARTING
            - RUNNING
            - STOPPING
            - STOPPED
            - ERRORED
            - TERMINATED
          example: "RUNNING"
        termination_reason:
          type: string
          description: |
            Why the instance was terminated. Only meaningful when
            `status` is `TERMINATED`.

            | Value | Meaning |
            |-------|---------|
            | `OTHER_UNKNOWN` | Reason not specified or unknown. |
            | `USER_INITIATED` | Terminated by user request. |
            | `CREDIT_EXHAUSTION` | Account credits ran out. |
          enum:
            - OTHER_UNKNOWN
            - USER_INITIATED
            - CREDIT_EXHAUSTION
          example: "USER_INITIATED"
        terminated_at:
          type: string
          format: date-time
          nullable: true
          description: |
            ISO 8601 timestamp when the instance was terminated.
            `null` if not yet terminated.
          example: "2026-06-26T14:30:00Z"
        resources:
          type: string
          description: |
            JSON-encoded string describing the hardware resources assigned
            to this instance.
          example: "{\"gpus\":[{\"model\":\"NVIDIA_A100_80G\",\"count\":2}]}"

    Pagination:
      type: object
      description: Cursor-based pagination metadata.
      properties:
        next:
          type: string
          nullable: true
          description: |
            Opaque cursor for the next page. Pass this as the `cursor` query
            parameter in the next request. `null` when there are no more pages.
          example: "eyJpZCI6ImExYjJjM2Q0In0"
        size:
          type: integer
          description: Maximum number of items requested per page.
          example: 50

    InstanceListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Instance"
        pagination:
          $ref: "#/components/schemas/Pagination"

    InstanceActionRequest:
      type: object
      description: Optional body for instance action endpoints.
      properties:
        reason_note:
          type: string
          maxLength: 10000
          description: Optional human-readable note explaining why the action was taken. Stored for audit purposes.
          example: "Stopping to save credits over the weekend."

    LogEntry:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
          description: UTC timestamp of the log line.
          example: "2026-06-26T10:01:00Z"
        message:
          type: string
          description: Log line content.
          example: "Training epoch 1/10 complete. Loss: 0.342"

    InstanceLogsResponse:
      type: object
      properties:
        entries:
          type: array
          items:
            $ref: "#/components/schemas/LogEntry"
        line_count:
          type: integer
          description: Number of log entries returned.
          example: 2

    ErrorResponse:
      type: object
      description: Standard error envelope returned for all 4xx and 5xx responses.
      properties:
        statusCode:
          type: integer
          description: HTTP status code.
          example: 401
        message:
          description: |
            Human-readable error message. May be a string (single error) or an
            array of strings (validation errors).
          oneOf:
            - type: string
            - type: array
              items:
                type: string
          example: "Missing API token"
        error:
          type: string
          description: Short HTTP reason phrase. Present on validation errors.
          example: "Unauthorized"
        timestamp:
          type: string
          format: date-time
          description: UTC timestamp when the error occurred.
          example: "2026-06-26T10:00:00.000Z"
        path:
          type: string
          description: Request path that produced the error.
          example: "/v1/instances"
